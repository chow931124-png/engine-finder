name: 📡 盘中数据自动更新

on:
  # 交易时段每30分钟自动更新（周一到周五，北京时间 9:00-15:30 = UTC 1:00-7:30）
  schedule:
    - cron: '*/30 1-7 * * 1-5'
  # 每次推送也触发
  push:
    branches: [main]
    paths-ignore:
      - 'scripts/update-market-data.mjs'
      - '.github/workflows/auto-update.yml'
  # 支持手动触发
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 使用 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 运行数据更新脚本
        run: node scripts/update-market-data.mjs
        continue-on-error: true

      - name: 读取更新时间检查是否有新数据
        id: check
        run: |
          if [ -f market-data.json ]; then
            echo "updated=yes" >> $GITHUB_OUTPUT
            echo "data=$(cat market-data.json | head -c 200)"
          else
            echo "updated=no" >> $GITHUB_OUTPUT
          fi

      - name: 提交并推送更新数据
        run: |
          git config --local user.name "Stock Engine Bot"
          git config --local user.email "bot@stock-engine.local"
          git add market-data.json -f
          # 只有 market-data.json 有变化时才提交
          if ! git diff --cached --quiet; then
            git commit -m "🤖 auto: 盘中数据更新 $(date '+%Y-%m-%d %H:%M')"
            git push
            echo "✅ 数据已更新并推送"
          else
            echo "⏸️  数据无变化，跳过提交"
          fi
