name: 📊 全A股每日扫描

on:
  schedule:
    - cron: '0 1 * * 1-5'
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 扫描全市场
        run: python3 full-market-scan-v2.py
      - name: 提交更新
        run: |
          git config user.name "stock-bot"
          git config user.email "bot@stock-engine-pack"
          git add dashboard-data.json
          git diff --staged --quiet || git commit -m "daily: $(date '+%Y-%m-%d %H:%M') 全A股扫描"
          git push
